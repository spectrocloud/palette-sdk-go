kind: api
name: eks_cluster_api
description: "Create EKS clusters"
service: clusters
agent: infra

modes:
  create_eks:
    description: "Create a new EKS cluster"
    method: CreateEks
    returns: "string_error"
    inputs:
      - name: cluster
        type: object
        go_type: "*models.V1SpectroEksClusterEntity"
        required: true
        description: "V1SpectroEksClusterEntity — full EKS cluster specification"
    output:
      single: cluster_uid
    example: '{"cluster": {"metadata": {"name": "prod-eks"}, "spec": {"cloudAccountUid": "...", "profiles": [{"uid": "..."}], "cloudConfig": {"region": "us-east-1"}}}}'
    notes:
      - "Requires a valid AWS cloud account UID"
      - "Requires a valid EKS-compatible cluster profile UID"
      - "Region must be a valid AWS region"
      - "This is the atomic API — for guided deployment, see the deploy_eks_cluster journey"
