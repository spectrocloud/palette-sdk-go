kind: api
name: vmware_cluster_api
description: "Create VMware vSphere clusters"
service: clusters
agent: infra

modes:
  create_vsphere:
    description: "Create a new vSphere cluster"
    method: CreateVsphere
    returns: "string_error"
    inputs:
      - name: cluster
        type: object
        go_type: "*models.V1SpectroVsphereClusterEntity"
        required: true
        description: "V1SpectroVsphereClusterEntity — full vSphere cluster specification"
    output:
      single: cluster_uid
    example: '{"cluster": {"metadata": {"name": "prod-vsphere"}, "spec": {"cloudAccountUid": "...", "profiles": [{"uid": "..."}], "cloudConfig": {"datacenter": "DC1", "folder": "/DC1/vm", "network": {"networkName": "VM Network"}}}}}'
    notes:
      - "Requires a valid vSphere cloud account (vcenter server, username, password)"
      - "Uses Controller Mode"
      - "Can serve as foundation for VMO (KubeVirt) workloads"
