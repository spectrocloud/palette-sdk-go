kind: journey
name: deploy_eks_cluster
description: "End-to-end journey for deploying an EKS cluster"
agent: infra
references:
  - eks_cluster_api
  - cloud_account_api
  - profile_api
  - cluster_common_api
includes:
  - ensure_cloud_account
  - ensure_cluster_profile

decision:
  question: "What kind of network environment?"
  signals:
    - keywords: [airgapped, disconnected, air-gapped, isolated, no internet, air gap]
      variant: airgapped
    - keywords: [private subnet, NAT, connected, standard, default, public]
      variant: connected
  default: connected

variants:
  connected:
    description: "Standard EKS deployment with internet access"
    steps:
      - description: "Ensure AWS cloud account exists"
        use: ensure_cloud_account
        context: "Provider is AWS. The user needs an AWS cloud account for EKS deployment."
        note: "List AWS accounts with interactive mode. If accounts exist, let user pick. If none exist, collect AWS credentials (name, access_key_id, secret_access_key) via a form, then create the account. The selected or created account's UID is needed for cluster creation."

      - description: "Ensure EKS-compatible cluster profile exists"
        use: ensure_cluster_profile
        context: "Cloud type is EKS. The user needs an infra profile with cloud_type=eks."
        note: "Search profiles filtered by environment=eks and profileType=cluster with interactive mode. If profiles exist, let user pick. If none exist, tell the user to create one in the Palette UI (profile creation requires pack selection which is not yet automated). The selected profile's UID is needed for cluster creation."

      - description: "Collect cluster configuration"
        tool: eks_cluster_api
        input: '{"collect": {"_title": "EKS Cluster Configuration", "cluster_name": {"type": "string", "label": "Cluster Name", "required": true}, "region": {"type": "string", "label": "AWS Region", "required": true, "default": "us-east-1"}, "instance_type": {"type": "string", "label": "Node Instance Type", "default": "t3.large"}, "node_count": {"type": "number", "label": "Node Count", "default": "3"}}}'
        note: "Show a form to collect cluster details."

      - description: "Create the EKS cluster"
        tool: eks_cluster_api
        note: "Build the full create_eks input from: the cloud account UID (from step 1), the profile UID (from step 2), and the collected config (from step 3). Call with mode create_eks."

    post_steps:
      - "Cluster provisioning is asynchronous — takes 10-15 minutes"
      - "Monitor status: cluster_common_api with {\"mode\": \"get_cluster_summary\", \"uid\": \"<cluster_uid>\"}"
      - "Get kubeconfig after Running: cluster_common_api with {\"mode\": \"get_client_kubeconfig\", \"uid\": \"<cluster_uid>\"}"

  airgapped:
    description: "EKS deployment in an isolated network without internet"
    steps:
      - description: "Ensure AWS cloud account exists"
        use: ensure_cloud_account
        context: "Provider is AWS."
        note: "Same as connected variant."

      - description: "Ensure EKS-compatible cluster profile exists"
        use: ensure_cluster_profile
        context: "Cloud type is EKS."
        note: "Same as connected variant."

      - description: "Ensure private ECR registry exists for airgapped images"
        use: ensure_registry
        context: "Registry type is ECR. Required for airgapped deployment."
        note: "List OCI registries with interactive mode. If none exist, collect ECR details (name, access_key, secret_key, region) and create. The registry is needed for image-swap configuration."

      - description: "Configure image-swap on the profile"
        manual: true
        note: "Image-swap pack must be added to the cluster profile to redirect image pulls to the private ECR mirror. This is currently a manual step in the Palette UI."

      - description: "Collect cluster and airgap configuration"
        tool: eks_cluster_api
        input: '{"collect": {"_title": "EKS Airgapped Cluster Configuration", "cluster_name": {"type": "string", "label": "Cluster Name", "required": true}, "region": {"type": "string", "label": "AWS Region", "required": true, "default": "us-east-1"}, "instance_type": {"type": "string", "label": "Node Instance Type", "default": "t3.large"}, "node_count": {"type": "number", "label": "Node Count", "default": "3"}, "http_proxy": {"type": "string", "label": "HTTP Proxy URL"}, "https_proxy": {"type": "string", "label": "HTTPS Proxy URL"}, "no_proxy": {"type": "string", "label": "No Proxy List"}}}'

      - description: "Create the EKS cluster with airgap configuration"
        tool: eks_cluster_api
        note: "Build the create_eks input including proxy config from collected data."

    post_steps:
      - "Verify all pods pull images from ECR mirror"
      - "Confirm proxy allows traffic to EKS API endpoint and ECR registry"
      - "Monitor status: cluster_common_api with {\"mode\": \"get_cluster_summary\", \"uid\": \"<cluster_uid>\"}"

notes:
  - "EKS uses AWS managed control plane — Palette provisions and manages worker nodes"
  - "Cross-account: use STS assume-role in the cloud account"
  - "Profile must have cloud_type: eks"
  - "When tools are called with 'interactive': true, they present a pick list and wait for user selection"
  - "When tools are called with 'collect': {fields}, they show a form and wait for user input"
  - "Steps with 'use: ensure_*' reference shared sub-journeys that handle 'pick or create' logic"
